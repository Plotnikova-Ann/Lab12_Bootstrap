<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Experiment - Карточка товара</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-sRlI4kxlLFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIavNWLzeN8tE5YbujZqLJB" 
          crossorigin="anonymous" />
    
    <link rel="stylesheet" href="custom.css" />
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="row">
            <div class="col-lg-4">
                <div class="card shadow-lg">
                    <img src="https://placeholder.apptor.studio/400/300/laptop.png" 
                         class="card-img-top" 
                         alt="Игровой ноутбук">
                    
                    <div class="position-absolute top-0 end-0 m-3">
                        <span class="badge bg-warning text-dark">
                            ★★★★☆ 4.5
                        </span>
                       
                    </div>
                    
                    <div class="card-body">
                        <!-- Заголовок карточки -->
                        <h5 class="card-title">Игровой ноутбук</h5>
                        
                        <!-- Описание -->
                        <p class="card-text">Мощный ноутбук для работы и игр</p>
                        
                        <!-- 3.5: Крупная цена -->
                        <h3 class="text-primary mb-3">89 990 ₽</h3>
                        
                        <!-- 3.6: Кнопка покупки на всю ширину -->
                        <button class="btn btn-success w-100">Купить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YyWJvWCxK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous"></script>
</body>
</html>
